services:
  face-api:
    build: .
    ports:
      - "8000:8000"
    restart: always # SRE 實踐：服務崩潰時自動重啟
    deploy:
      resources:
        limits:
          memory: 1G # SRE 實踐：限制資源防止 OOM (Out of Memory)

  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # 讓 Jenkins 可以在容器內跑 Docker
    restart: always

volumes:
  jenkins_data: